name: Build and Release MicroFIX

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Enforce go fmt
        run: |
          UNFORMATTED=$(go fmt ./...)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            echo "Please run 'go fmt ./...' locally and push again."
            exit 1
          fi

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: lint
    runs-on: ${{ matrix.runner }}
    
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Linux Dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Windows Dependencies
        if: matrix.goos == 'windows'
        run: choco install upx -y

      - name: Run go vet
        run: go vet ./...

      - name: Build Binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          mkdir -p build_output
          
          EXT=""
          GUI_FLAGS="-s -w"
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=${GITHUB_SHA:0:7}
          
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
            GUI_FLAGS="-s -w -H windowsgui"
            
            echo "Generating Windows icons and .syso files..."
            go install github.com/leaanthony/winicon/cmd/winicon@latest
            go install github.com/akavel/rsrc@latest
            
            # Ensure the installed Go binaries are in the path
            export PATH=$PATH:$(go env GOPATH)/bin
            
            # Generate for mxgui
            winicon g cmd/mxgui/assets/image/logo.png -o cmd/mxgui/logo.ico
            rsrc -ico cmd/mxgui/logo.ico -arch amd64 -o cmd/mxgui/rsrc_windows_amd64.syso
            
            # Generate for mxshell
            winicon g cmd/mxshell/build/mxshell.png -o cmd/mxshell/mxshell.ico
            rsrc -ico cmd/mxshell/mxshell.ico -arch amd64 -o cmd/mxshell/rsrc_windows_amd64.syso
          fi

          # Build mxshell (Pure Go)
          echo "Building mxshell..."
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.GitCommit=${COMMIT}" \
            -o "build_output/mxshell-${GOOS}-${GOARCH}${EXT}" \
            ./cmd/mxshell

          # Build mxgui (CGO enabled)
          echo "Building mxgui..."
          CGO_ENABLED=1 go build \
            -tags desktop,production \ 
            -ldflags="$GUI_FLAGS -X main.Version=${VERSION} -X main.GitCommit=${COMMIT}" \
            -o "build_output/mxgui-${GOOS}-${GOARCH}${EXT}" \
            ./cmd/mxgui

      - name: Compress Binaries with UPX
        shell: bash
        run: |
          for binary in build_output/*; do
            if [ -f "$binary" ]; then
              if [[ "$binary" == *.exe ]]; then
                base="${binary%.exe}"
                cp "$binary" "${base}-upx.exe"
                upx --best "${base}-upx.exe" || echo "Warning: UPX failed for $binary"
              else
                cp "$binary" "${binary}-upx"
                upx --best "${binary}-upx" || echo "Warning: UPX failed for $binary"
              fi
            fi
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microfix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build_output/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: microfix-*
          merge-multiple: true
          path: release-assets

      - name: Generate Checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
