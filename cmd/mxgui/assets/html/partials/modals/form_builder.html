{{define "partials/modals/form_builder"}}
<div 
    x-show="modal === 'form'" 
    x-data="{
        tagMap: {{ getAllFieldNamesAsJSON .Router }},
        fields: [],
        
        initFromRaw() {
            let raw = document.getElementById('message-input').value.trim();
            this.fields = [];
            
            // Clean up trailing delimiter if it exists
            if (raw.endsWith('|')) { raw = raw.slice(0, -1); }
            
            if (!raw) {
                // If textarea is empty, provide a sensible starter template
                this.fields = [
                    { tag: '35', value: '' },
                    { tag: '49', value: '' },
                    { tag: '56', value: '' }
                ];
                return;
            }
            
            // Parse existing string into fields array
            raw.split('|').forEach(pair => {
                let parts = pair.split('=');
                if (parts.length >= 2) {
                    let tag = parts.shift().trim();
                    let val = parts.join('=').trim(); // re-join in case value contains an '='
                    this.fields.push({ tag: tag, value: val });
                }
            });
        },
        
        addField() { this.fields.push({ tag: '', value: '' }); },
        
        removeField(index) { this.fields.splice(index, 1); },
        
        applyToEditor() {
            // Re-serialize valid fields back into the FIX format
            let fixString = this.fields
                .filter(f => f.tag.trim() !== '' && f.value.trim() !== '')
                .map(f => f.tag.trim() + '=' + f.value.trim())
                .join('|');
                
            let ta = document.getElementById('message-input');
            if (ta) {
                ta.value = fixString + (fixString ? '|' : ''); // Optional: append trailing pipe
                ta.dispatchEvent(new Event('input', { bubbles: true }));
            }
            
            modal = '';
        },
        
        getTagName(tag) {
            if (!tag.trim()) return '...';
            return this.tagMap[tag] || 'Unknown Tag';
        }
    }"
    
    x-init="$watch('modal', value => { if (value === 'form') initFromRaw() })"
    
    @mousedown.outside="modal = ''" 
    class="bg-gray-900 border border-gray-700 rounded-lg shadow-2xl w-[600px] max-h-[80vh] flex flex-col z-50 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
>
    <div class="flex items-center justify-between p-4 border-b border-gray-800 shrink-0">
        <div>
            <h3 class="text-white font-bold text-lg">Form Builder</h3>
            <p class="text-xs text-gray-400 font-mono mt-1">Syncing with raw message</p>
        </div>
        <button @click="modal = ''" class="text-gray-500 hover:text-white transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <div class="p-4 overflow-y-auto flex-1 bg-[#0a0d12] space-y-1">
        <template x-for="(field, index) in fields" :key="index">
            <div class="flex items-center space-x-3 hover:bg-gray-900 p-1.5 rounded transition group">
                
                <div class="w-48 flex items-center space-x-2 shrink-0">
                    <input x-model="field.tag" type="text" placeholder="Tag"
                        class="w-12 bg-gray-950 border border-gray-700 rounded px-1.5 py-1 text-sm text-blue-300 font-mono 
                          focus:border-blue-500 focus:outline-none text-center placeholder-gray-700" 
                    >
                    <span 
                        class="text-xs font-mono truncate max-w-[130px]" 
                        x-text="getTagName(field.tag)" 
                        :class="!tagMap[field.tag] && field.tag.trim() !== '' ? 'text-yellow-600 italic' : 'text-gray-500'"
                    ></span>
                </div>
                
                <input 
                    x-model="field.value" type="text" placeholder="Value"
                    class="flex-1 bg-gray-950 border border-gray-700 rounded px-2 py-1.5 text-sm text-white font-mono focus:border-blue-500 focus:outline-none placeholder-gray-800" 
                >
                
                <button @click="removeField(index)" class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 transition p-1" title="Remove Field" >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </button>
                
            </div>
        </template>

        <button @click="addField()" class="w-full mt-4 py-2 border border-dashed border-gray-700 text-gray-500 hover:text-white hover:border-gray-500 rounded text-sm transition font-bold cursor-pointer flex justify-center items-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            <span>Add Field</span>
        </button>
    </div>

    <div class="p-4 border-t border-gray-800 flex justify-end space-x-3 bg-gray-900 shrink-0">
        <button @click="modal = ''" class="px-4 py-2 text-sm text-gray-400 hover:text-white transition cursor-pointer">Cancel</button>
        <button @click="applyToEditor()" class="px-6 py-2 text-sm bg-blue-600 hover:bg-blue-500 text-white rounded font-bold transition shadow-lg cursor-pointer">Apply to Message</button>
    </div>
</div>
{{end}}
