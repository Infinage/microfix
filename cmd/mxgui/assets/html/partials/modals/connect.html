{{define "partials/modals/connect"}}
<div
    x-show="modal === 'connect'"
    x-data="{mode: 'client', loading: false}"
    @click.away="if (!loading) modal = ''"
    class="bg-gray-900 border border-gray-700 rounded-lg shadow-2xl w-96 p-5"
>
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-white font-bold text-lg">Connection Settings</h3>
        <div class="flex items-center space-x-2 bg-gray-950 p-1 rounded-lg border border-gray-800">
            <button type="button" @click="mode = 'client'" :disabled="loading"
                :class="mode === 'client' ? 'bg-blue-600 text-white' : 'text-gray-500 hover:text-gray-300'"
                class="px-3 py-1 text-xs font-bold rounded transition"
            >Client</button>
            <button type="button" @click="mode = 'server'" :disabled="loading"
                :class="mode === 'server' ? 'bg-purple-700 text-white' : 'text-gray-500 hover:text-gray-300'"
                class="px-3 py-1 text-xs font-bold rounded transition"
            >Server</button>
        </div>
    </div>

    <form hx-post="/api/connect" hx-swap="none" @htmx:before-request="loading = true" @htmx:after-request="loading = false" @close-modal.window="modal = ''">
        <input type="hidden" name="mode" :value="mode">
        <fieldset :disabled="loading" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Host / Bind IP</label>
                <input type="text" name="host" value="{{.Config.IpAddr}}"
                    class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-white font-mono mt-1 focus:border-blue-500 focus:outline-none"
                >
            </div>

            <div>
                <label class="text-xs text-gray-400 font-bold uppercase tracking-wider">Port</label>
                <input 
                  type="number" name="port" value="{{.Config.Port}}"
                  class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-white font-mono mt-1 focus:border-blue-500 focus:outline-none"
                >
            </div>
        </fieldset>

        <div class="mt-6 flex justify-end space-x-3">
            <button type="button" @click="modal = ''" :disabled="loading"
                class="px-4 py-2 text-sm text-gray-400 hover:text-white transition disabled:opacity-50"
            >Cancel</button>

            <button
                type="submit" :disabled="loading" :class="mode === 'client' ? 'bg-blue-600 hover:bg-blue-500' : 'bg-purple-700 hover:bg-purple-600'"
                class="px-4 py-2 text-sm text-white rounded font-bold transition shadow-lg w-28 flex items-center justify-center gap-2 disabled:opacity-60"
            >
              <span x-show="!loading" x-text="mode === 'client' ? 'Connect' : 'Listen'"></span>
              <svg x-show="loading" class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none" style="display:none" >
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-dasharray="31.4 31.4" />
              </svg>
            </button>
        </div>
    </form>
</div>
{{end}}
