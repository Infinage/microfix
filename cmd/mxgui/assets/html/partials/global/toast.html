{{define "partials/global/toast"}}
<div hx-swap-oob="beforeend:#toast-container">
    <div x-data="{ show: true }" 
         x-show="show" 
         x-init="setTimeout(() => show = false, 4000)"
         x-transition.duration.300ms
         class="px-4 py-3 rounded-lg shadow-2xl flex items-start justify-between space-x-4 mb-3 border text-sm font-bold 
                min-w-[300px] max-w-[450px] w-full break-words overflow-wrap-anywhere
                {{if eq .type "error"}}bg-red-100 dark:bg-red-950/90 border-red-300 dark:border-red-900/50 text-red-700 dark:text-red-400{{end}} 
                {{if eq .type "success"}}bg-green-100 dark:bg-green-950/90 border-green-300 dark:border-green-900/50 text-green-700 dark:text-green-400{{end}}">
        <span class="flex-1 break-all select-text">{{ .message }}</span>
        <button @click="show = false" class="text-gray-600 dark:text-gray-500 hover:text-gray-900 dark:hover:text-white text-lg leading-none shrink-0 mt-0.5 cursor-pointer">&times;</button>
    </div>
</div>
{{end}}
