{{define "partials/toolbox/finalize"}}
<div x-show="toolboxTab === 'finalize'" style="display: none;" class="flex-1 flex flex-col overflow-hidden">
    <h2 class="text-2xl font-bold text-white mb-2">FIX Finalize</h2>
    <p class="text-gray-400 text-sm mb-6">Paste incomplete raw FIX messages to automatically calculate and append missing BodyLength (Tag 9) and Checksum (Tag 10).</p>
    
    <div class="flex-1 flex space-x-6 p-1 overflow-hidden">
        <div class="flex-1 flex flex-col">
            <label class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-2">Raw Input</label>
            <textarea 
              spellcheck="false"
              name="finalize-input"
              id="finalize-input" 
              class="flex-1 bg-gray-950 border border-gray-800 rounded p-4 font-mono text-sm text-gray-300 resize-none focus:border-blue-500 focus:outline-none shadow-inner" 
              placeholder="8=FIX.4.4|35=D|55=AAPL|..."
              minlength="4"
              @keydown.enter.prevent="$refs.FinalizeSubmit.click()"
            ></textarea>
        </div>
        <div class="flex flex-col justify-center shrink-0">
            <button 
              x-ref="FinalizeSubmit"
              hx-get="/api/finalize"
              hx-include="#finalize-input"
              hx-target="#finalize-output"
              class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-full font-bold transition shadow-lg cursor-pointer" 
              title="Finalize Message"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
        <div class="flex-1 flex flex-col" x-data="{copied: false}">
            <label class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-2">Calculated Output</label>
            <textarea 
              spellcheck="false"
              id="finalize-output" 
              class="flex-1 bg-gray-950 border border-gray-800 rounded p-4 font-mono text-sm text-gray-300 resize-none focus:border-blue-500 focus:outline-none shadow-inner" 
              readonly placeholder="Output with calculated lengths and checksums will appear here..."
            ></textarea>
            <button 
              @click="
                  navigator.clipboard.writeText(document.getElementById('finalize-output').value.replace(/\|/g, '\n')); 
                  copied = true; setTimeout(() => copied = false, 2000);
              "
              class="mt-4 bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm transition border border-gray-700 w-full 
                font-bold flex items-center justify-center space-x-2 cursor-pointer"
            >
              <svg x-show="!copied" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
              </svg>
              <svg x-show="copied" style="display:none;" class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              <span x-text="copied? 'Copied to clipboard!': 'Copy message'"></span>
            </button>
        </div>
    </div>
</div>
{{end}}
