{{define "partials/toolbox/finalize"}}
<div x-show="toolboxTab === 'finalize'" style="display: none;" class="flex-1 flex flex-col overflow-hidden">
    <div class="flex justify-between items-center mb-6 shrink-0">
        <div class="select-none">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">FIX Finalize</h2>
            <p class="text-gray-600 dark:text-gray-400 text-sm mt-1">
                Repair missing mandatory header fields and recalculate BodyLength (Tag 9) and CheckSum (Tag 10).
            </p>
        </div>
    </div>
    
    <div class="flex-1 flex flex-col space-y-6 overflow-hidden">
        <div class="flex flex-col shrink-0" 
          x-data="{
            // Handle textarea resizing
            dragging: false, startY: 0, startHeight: 192, finalizeInputHeight: 192,

            // Pretty printing SOH characters
            rawFixData: '',
            set displayFixData(val) { this.rawFixData = val.replace(/\|/g, '\x01'); },
            get displayFixData() { return this.rawFixData.replace(/\x01/g, '|'); },
          }"
          :style="`height: ${finalizeInputHeight}px`"
        >
            <label class="text-sm text-gray-600 dark:text-gray-500 font-bold uppercase tracking-widest mb-2 select-none">Raw Input</label>
            <div class="relative mb-3 flex-1 flex flex-col min-h-0">
              <textarea 
                id="finalize-input" 
                x-model="displayFixData"
                @keydown.enter.prevent="$refs.FinalizeSubmit.click()"
                spellcheck="false"
                class="flex-1 w-full bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-800 rounded p-4 font-mono min-h-0 text-sm text-gray-900 dark:text-gray-300 resize-none 
                  focus:border-blue-500 focus:outline-none shadow-inner" 
                placeholder="8=FIX.4.4|35=D|55=AAPL|..."
                minlength="4"
              ></textarea>

              <input type="hidden" :value="rawFixData" name="finalize-input" id="finalize-input-raw"/>

              <div 
                class="absolute left-0 right-0 bottom-0 h-1.5 -mb-[1px] cursor-row-resize hover:bg-blue-500 z-10 transition-colors"
                @mousedown.prevent="dragging = true; startY = $event.clientY; startHeight = finalizeInputHeight;"
                @mouseup.window="dragging = false"
                @mousemove.window="if(dragging) {
                  let calculatedHeight = startHeight + ($event.clientY - startY);
                  finalizeInputHeight = Math.min(window.innerHeight - 280, Math.max(140, calculatedHeight))
                }"
              ></div>
            </div>

            <button
              x-ref="FinalizeSubmit"
              hx-get="/api/finalize"
              hx-include="#finalize-input-raw"
              hx-target="#finalize-output"
              class="shrink-0 bg-blue-600 hover:bg-blue-500 cursor-pointer text-white px-6 py-2 rounded text-sm font-bold transition shadow-lg w-48"
            >Calculate &amp; Finalize</button>
        </div>
        
        <div class="flex-1 flex flex-col overflow-hidden border-t border-gray-200 dark:border-gray-800 pt-6" x-data="{copied: false, rawOutput: ''}">
            <div class="flex justify-between items-end mb-2">
                <label class="text-sm text-gray-600 dark:text-gray-500 font-bold uppercase tracking-widest select-none">Calculated Output</label>
                <button 
                  class="text-xs bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 px-3 py-1.5 rounded transition border border-gray-300 dark:border-gray-700 
                    font-bold flex items-center space-x-1.5 cursor-pointer shadow-sm"
                  @click="
                      navigator.clipboard.writeText(rawOutput); 
                      copied = true; setTimeout(() => copied = false, 2000);
                  "
                >
                  <svg x-show="!copied" class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                  </svg>
                  <svg x-show="copied" style="display:none;" class="w-3.5 h-3.5 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                  <span x-text="copied? 'Copied!': 'Copy Message'"></span>
                </button>
            </div>
            <textarea
              spellcheck="false"
              id="finalize-output"
              class="flex-1 bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-800 rounded p-4 font-mono text-sm text-blue-700 dark:text-blue-300 resize-none focus:border-blue-500 focus:outline-none shadow-inner" 
              readonly placeholder="Output with calculated lengths and checksums will appear here..."
              @htmx:after-swap="
                rawOutput = $event.detail.xhr.responseText;
                $el.value = rawOutput.replace(/\x01/g, '|');
              "
            ></textarea>
        </div>
    </div>
</div>
{{end}}
