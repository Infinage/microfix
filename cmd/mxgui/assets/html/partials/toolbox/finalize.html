{{define "partials/toolbox/finalize"}}
<div x-show="toolboxTab === 'finalize'" style="display: none;" class="flex-1 flex flex-col overflow-hidden">
    <div class="flex justify-between items-center mb-6 shrink-0">
        <div>
            <h2 class="text-2xl font-bold text-white">FIX Finalize</h2>
            <p class="text-gray-400 text-sm mt-1">
              Paste a raw or incomplete FIX message to repair missing mandatory header fields and automatically recalculate BodyLength (Tag 9) and CheckSum (Tag 10).
            </p>
        </div>
    </div>
    
    <div class="flex-1 flex flex-col space-y-6 overflow-hidden">
        <div class="flex flex-col h-48 shrink-0">
            <label class="text-sm text-gray-500 font-bold uppercase tracking-widest mb-2">Raw Input</label>
            <textarea 
              spellcheck="false"
              name="finalize-input"
              id="finalize-input" 
              class="flex-1 bg-gray-950 border border-gray-800 rounded p-4 font-mono text-sm text-gray-300 resize-none focus:border-blue-500 focus:outline-none shadow-inner" 
              placeholder="8=FIX.4.4|35=D|55=AAPL|..."
              minlength="4"
              @keydown.enter.prevent="$refs.FinalizeSubmit.click()"
            ></textarea>
            <button 
              x-ref="FinalizeSubmit"
              hx-get="/api/finalize"
              hx-include="#finalize-input"
              hx-target="#finalize-output"
              class="mt-3 bg-blue-600 hover:bg-blue-500 cursor-pointer text-white px-6 py-2 rounded text-sm font-bold transition shadow-lg w-48"
            >Calculate &amp; Finalize</button>
        </div>
        
        <div class="flex-1 flex flex-col overflow-hidden border-t border-gray-800 pt-6" x-data="{copied: false}">
            <div class="flex justify-between items-end mb-2">
                <label class="text-sm text-gray-500 font-bold uppercase tracking-widest">Calculated Output</label>
                <button 
                  class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1.5 rounded transition border border-gray-700 
                    font-bold flex items-center space-x-1.5 cursor-pointer shadow-sm"
                  @click="
                      navigator.clipboard.writeText(document.getElementById('finalize-output').value); 
                      copied = true; setTimeout(() => copied = false, 2000);
                  "
                >
                  <svg x-show="!copied" class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                  </svg>
                  <svg x-show="copied" style="display:none;" class="w-3.5 h-3.5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                  <span x-text="copied? 'Copied!': 'Copy Message'"></span>
                </button>
            </div>
            <textarea 
              spellcheck="false"
              id="finalize-output" 
              class="flex-1 bg-gray-950 border border-gray-800 rounded p-4 font-mono text-sm text-blue-300 resize-none focus:border-blue-500 focus:outline-none shadow-inner" 
              readonly placeholder="Output with calculated lengths and checksums will appear here..."
            ></textarea>
        </div>
    </div>
</div>
{{end}}
