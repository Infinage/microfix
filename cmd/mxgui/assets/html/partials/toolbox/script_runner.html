{{define "partials/toolbox/script_runner"}}
<div x-data="{ view: 'editor', running: false, showHelp: false }" 
     @script-error.window="running = false"
     x-show="toolboxTab === 'scripts'" 
     class="flex-1 flex flex-col overflow-hidden relative">
    
    <!-- Header/Control Bar -->
    <div class="flex justify-between items-center mb-4 shrink-0 bg-gray-900/40 p-2 rounded-lg border border-gray-800">
        <div class="flex items-center space-x-4">
            
            <!-- Professional Mode Selector Switches -->
            <div class="bg-gray-950 p-1 rounded-md border border-gray-800 flex space-x-1">
                <button type="button" 
                        @click="view = 'editor'"
                        :class="view === 'editor' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:text-white'"
                        class="px-4 py-1.5 rounded text-xs font-semibold transition tracking-wider uppercase">
                    Editor
                </button>
                <button type="button" 
                        @click="view = 'console'"
                        :class="view === 'console' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:text-white'"
                        class="px-4 py-1.5 rounded text-xs font-semibold transition tracking-wider uppercase">
                    Console
                </button>
            </div>
            
            <label class="flex items-center space-x-2 text-xs text-gray-400 cursor-pointer">
                <input type="checkbox" form="script-form" name="verbose" value="true" class="rounded bg-gray-900 border-gray-700" checked>
                <span>Verbose Engine Logs</span>
            </label>
        </div>

        <div class="flex items-center space-x-3">
            <button @click="showHelp = true" type="button"
                    class="text-xs bg-transparent hover:bg-gray-800 text-gray-400 hover:text-gray-200 px-3 py-1.5 rounded border border-gray-700 transition font-medium">
                Syntax Reference
            </button>
            
            <button type="submit" form="script-form" :disabled="running"
                    class="bg-green-600 hover:bg-green-500 text-white px-5 py-1.5 rounded text-xs font-bold transition shadow-md flex items-center space-x-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
                <span x-show="!running">Run Script</span>
                <span x-show="running" class="animate-pulse">Executing...</span>
            </button>
        </div>
    </div>

    <!-- Main Workspace Area -->
    <div class="flex-1 min-h-0 relative rounded-lg border border-gray-800 overflow-hidden bg-gray-950">
        
        <!-- Form Context Container -->
        <form id="script-form"
              hx-post="/api/script/execute" 
              hx-encoding="application/x-www-form-urlencoded" 
              hx-target="#sse-injector" 
              hx-swap="innerHTML"
              @submit="running = true; view = 'console'; document.getElementById('script-console').innerHTML = '';"
              class="absolute inset-0 flex flex-col"
              x-show="view === 'editor'"
        >
            <!-- Massive full-height Editor View -->
            <textarea name="scriptContent" autocomplete="off" spellcheck="false"
              class="w-full flex-1 bg-transparent text-green-400 font-mono text-sm p-4 outline-none resize-none shadow-inner" 
              placeholder="# Type your MXShell script here...&#10;&#10;connect&#10;waitstatus Active&#10;send 35=D|55=AAPL|54=1..."></textarea>
        </form>

        <!-- Full View Console Panel -->
        <div id="script-console" 
             x-show="view === 'console'"
             class="absolute inset-0 p-4 overflow-y-auto font-mono text-sm space-y-2 selection:bg-blue-500/30">
            <div class="text-gray-500 italic flex h-full items-center justify-center select-none">
                <div class="text-center">
                    <p class="text-base text-gray-400 font-sans not-italic mb-1">Console Idle</p>
                    <p class="text-xs text-gray-600 font-sans not-italic">Write a script and press run to stream real-time output loopbacks.</p>
                </div>
            </div>
        </div>

        <!-- Centered Modal for Syntax Help -->
        <div x-show="showHelp" x-transition.opacity
             class="absolute inset-0 z-50 flex items-center justify-center bg-gray-950/80 backdrop-blur-sm p-4"
             style="display: none;"
        >
            <div @click.outside="showHelp = false"
                 class="bg-gray-900 border border-gray-700 rounded-lg shadow-2xl w-full max-w-[80%] flex flex-col overflow-hidden max-h-full">
                
                <!-- Modal Header -->
                <div class="flex justify-between items-center bg-gray-950 px-4 py-3 border-b border-gray-800">
                    <h3 class="font-bold text-white text-sm tracking-wide">Scripting Reference</h3>
                    <button @click="showHelp = false" class="text-gray-500 hover:text-white text-lg leading-none">&times;</button>
                </div>
                
                <!-- Modal Body -->
                <div class="p-5 overflow-y-auto">
                    <pre class="font-mono text-sm text-gray-300 whitespace-pre-wrap select-text leading-relaxed">{{ .ScriptingReference }}</pre>
                </div>
            </div>
        </div>

    </div>
    
    <!-- Invisible SSE Container -->
    <div id="sse-injector" class="hidden"></div>
</div>
{{end}}
