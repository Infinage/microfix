{{define "partials/toolbox/script_runner"}}
<div x-data="{ hasFile: false, fileName: '', running: false }" 
     @script-upload-error.window="running = false"
     x-show="toolboxTab === 'scripts'" 
     class="flex-1 flex flex-col overflow-hidden">
    
    <div class="flex justify-between items-center mb-6 shrink-0">
        <div>
            <h2 class="text-2xl font-bold text-white">Batch Script Runner</h2>
            <p class="text-gray-400 text-sm mt-1">Execute .mxs scripts for automated testing and protocol simulations.</p>
        </div>
        
        <form hx-post="/api/script/upload" 
              hx-encoding="multipart/form-data" 
              hx-target="#sse-injector" 
              hx-swap="innerHTML"
              @submit="running = true; document.getElementById('script-console').innerHTML = '';"
              class="flex space-x-3 items-center"
        >
            <label class="flex items-center space-x-2 text-sm text-gray-400 cursor-pointer mr-4">
                <input type="checkbox" name="verbose" value="true" class="rounded bg-gray-900 border-gray-700" checked>
                <span>Verbose Engine Logs</span>
            </label>

            <input type="file" id="script-upload" name="scriptFile" accept=".mxs" class="hidden"
                   @change="fileName = $event.target.files[0].name; hasFile = true;">
            
            <button type="button" @click="document.getElementById('script-upload').click()" :disabled="running"
                class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm transition border border-gray-700 
                  font-bold disabled:opacity-50 disabled:cursor-not-allowed">
                <span x-text="hasFile ? fileName : 'Browse .mxs...'"></span>
            </button>

            <button type="submit" :disabled="!hasFile || running"
                    class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded text-sm font-bold transition shadow-lg 
                      flex items-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-green-600">
                <span x-show="!running">▶ Run Script</span>
                <span x-show="running" class="animate-pulse">Running...</span>
            </button>
        </form>
    </div>
    
    <div id="sse-injector" class="hidden"></div>

    <div id="script-console" class="bg-gray-950 border border-gray-800 rounded-lg p-4 flex-1 overflow-y-auto font-mono text-sm shadow-inner space-y-2">
        <div class="text-gray-600 italic">Select a script and click Run to view output...</div>
    </div>
</div>
{{end}}
