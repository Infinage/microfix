{{define "partials/stream/inspector/validate"}}
<div 
  x-show="inspectorTab === 'validation'" 
  style="display:none;" 
  class="space-y-4"
  x-data="{
    search: '', showMuted: false, newRule: '', allErrors: [],
    muted: JSON.parse(localStorage.getItem('fixMutedErrors') || '[]'),

    // Extract all errors from DOM when loaded
    init() {
      this.$nextTick(() => {
        this.allErrors = Array.from(this.$el.querySelectorAll('[data-err]')).map(el => el.dataset.err);
      });
    },

    // Calculate how many total errors are currently hidden
    get totalMutedCount() {
      return this.allErrors.filter(err => this.isMuted(err)).length;
    },

    // Calculate how many errors a SPECIFIC rule is hiding
    getRuleHitCount(rulePattern) {
      try {
        let regex = new RegExp(rulePattern, 'i');
        return this.allErrors.filter(err => regex.test(err)).length;
      } catch(e) {
        return 0;
      }
    },
    
    // Save to local storage
    saveMuted() { localStorage.setItem('fixMutedErrors', JSON.stringify(this.muted)); },

    // Escape special characters so default clicks do an exact string match
    escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); },

    // Check if an error matches ANY of the saved regex rules
    isMuted(err) {
      return this.muted.some(pattern => {
        try {
          return new RegExp(pattern, 'i').test(err);
        } catch (e) {
          return false; // Ignore invalid regexes
        }
      });
    },

    // Default mute button action (Exact match)
    muteExact(err) {
      let exactPattern = '^' + this.escapeRegex(err) + '$';
      if (!this.muted.includes(exactPattern)) {
        this.muted.push(exactPattern);
        this.saveMuted();
      }
    },

    // Add a custom regex rule from the input box
    addCustomRule() {
      let rule = this.newRule.trim();
      if (!rule) return;
      
      try {
        new RegExp(rule); // Test if it's a valid regex
        if (!this.muted.includes(rule)) {
          this.muted.push(rule);
          this.saveMuted();
        }
        this.newRule = '';
      } catch (e) {
        alert('Invalid Regular Expression');
      }
    },

    unmute(pattern) {
      this.muted = this.muted.filter(m => m !== pattern);
      this.saveMuted();
    },

    clearMuted() {
      this.muted = [];
      this.saveMuted();
    }
  }"
>
  {{if .IsValid}}
    <div class="text-green-700 dark:text-green-400 text-sm font-mono bg-green-50 dark:bg-green-900/10 p-4 rounded border border-green-200 dark:border-green-900/30">
        No validation errors detected. Structure and sequence are correct.
    </div>
  {{else}}
    <div class="flex items-center gap-2">
      <input
        type="text"
        x-model="search"
        placeholder="Filter errors..."
        class="flex-1 bg-white dark:bg-[#0a0d12] border border-gray-300 dark:border-gray-800 rounded px-3 py-1.5 text-xs font-mono text-gray-800 dark:text-gray-300 focus:border-blue-500 focus:outline-none transition-colors"
      >
      <button
        @click="showMuted = !showMuted"
        class="text-xs bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-400 px-3 py-1.5 rounded transition whitespace-nowrap cursor-pointer"
        x-text="`Rules (${muted.length})`"
      ></button>
    </div>

    <div x-show="showMuted" x-transition class="border border-gray-200 dark:border-gray-800 rounded bg-white dark:bg-[#0a0d12] p-3 space-y-3" style="display:none;">
      
      <div class="flex items-center gap-2">
        <input
          type="text"
          x-model="newRule"
          @keydown.enter.prevent="addCustomRule()"
          placeholder="e.g., Unknown tag.*"
          class="flex-1 bg-gray-50 dark:bg-gray-950 border border-gray-300 dark:border-gray-800 rounded px-2 py-1 text-xs font-mono text-gray-800 dark:text-gray-300 focus:border-blue-500 focus:outline-none transition-colors"
        >
        <button 
          @click="addCustomRule()"
          class="text-[11px] bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded transition cursor-pointer"
        >Add Regex</button>
      </div>

      <div class="space-y-1">
        <template x-if="muted.length === 0">
          <div class="text-xs text-gray-500 dark:text-gray-600 italic select-none">No active mute rules.</div>
        </template>

        <template x-for="rule in muted" :key="rule">
          <div class="flex items-center justify-between gap-2 text-[11px] font-mono text-gray-600 dark:text-gray-500 group">
            <div class="flex items-center gap-1.5 min-w-0">
                <span class="truncate bg-gray-100 dark:bg-gray-900 px-1.5 py-0.5 rounded border border-gray-200 dark:border-gray-800" x-text="rule"></span>
                <span class="text-gray-500 dark:text-gray-600 shrink-0" x-text="`(${getRuleHitCount(rule)} hidden)`"></span>
            </div>
            <button @click="unmute(rule)" class="text-red-500/70 hover:text-red-600 dark:hover:text-red-400 shrink-0 cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">delete</button>
          </div>
        </template>
      </div>

      <button 
        x-show="muted.length > 0"
        @click="clearMuted()" 
        class="text-[11px] text-red-500/70 hover:text-red-600 dark:hover:text-red-400 pt-1 cursor-pointer w-full text-left"
      >Clear all rules</button>
    </div>

    <div class="border border-red-200 dark:border-red-900/40 rounded overflow-hidden bg-white dark:bg-[#0a0d12] shadow-sm">
      <div class="bg-red-50 dark:bg-red-950/30 px-4 py-2 border-b border-red-200 dark:border-red-900/40 flex items-center space-x-2">
          <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
            ></path>
          </svg>
          <span class="text-xs font-bold text-red-600 dark:text-red-400 uppercase tracking-wider font-sans select-none">
            Validation Errors ({{if .Observations}}{{len .Observations}}{{end}})
          </span>
      </div>
      <ul class="divide-y divide-gray-100 dark:divide-gray-800/60">
          {{range .Observations}}
          <li 
            data-err="{{.}}"
            x-data="{ err: $el.dataset.err }"
            x-show="!isMuted(err) && (search === '' || err.toLowerCase().includes(search.toLowerCase()))"
            class="flex items-start justify-between gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/30 transition"
          >
              <div class="flex items-start space-x-3 min-w-0">
                <span class="text-red-500/50 mt-1 shrink-0 font-mono text-[10px] select-none">►</span>
                <span class="text-sm font-mono text-gray-800 dark:text-gray-300 leading-relaxed" x-text="err"></span>
              </div>
              <button 
                @click="muteExact(err)" 
                title="Mute this exact error"
                class="text-gray-400 hover:text-red-500 dark:text-gray-600 dark:hover:text-red-400 shrink-0 mt-0.5 transition cursor-pointer"
              >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 
                    10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 
                    4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 
                    9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                </svg>
              </button>
          </li>
          {{end}}
      </ul>
    </div>
  {{end}}
</div>
{{end}}
