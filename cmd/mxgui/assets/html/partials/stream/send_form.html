{{define "partials/stream/send_form/aliases"}}
<div hx-trigger="refresh-alias from:body" hx-get="/api/alias/list" hx-vals='{"from": "stream"}' class="flex-1 min-w-[100px] max-w-[200px]">
  <select 
   name="alias"
    hx-get="/api/alias/get"
    hx-target="#message-input"
    x-model="selectedAlias" 
    @change="selectedMsgType = ''" 
    :class="selectedAlias !== '' ? 'border-blue-500' : 'border-gray-700'" 
    class="w-full truncate bg-gray-950 border text-gray-300 text-sm rounded px-3 py-1.5 outline-none focus:border-blue-500 font-mono transition"
  >
      <option disabled value="">-- Select Alias --</option>
      {{range $alias, $_ := .Aliases}}
        <option value={{$alias}}>Alias: {{$alias}}</option>
      {{end}}
  </select>
</div>
{{end}}

{{define "partials/stream/send_form"}}
<div 
  x-data="{ mode: 'alias', selectedAlias: '', selectedMsgType: '' }" 
  class="bg-gray-900/40 border-b border-gray-800 flex flex-col shrink-0 p-4"
>
    <div class="flex flex-wrap lg:flex-nowrap justify-between items-center gap-3 mb-3">
        <div class="flex flex-1 items-center gap-3 min-w-0">
            {{template "partials/stream/send_form/aliases" .}}

            <span class="text-gray-600 font-bold text-xs shrink-0">OR</span>

            <select 
             name="msgtype"
              hx-get="/api/sample"
              hx-target="#message-input"
              x-model="selectedMsgType" 
              @change="selectedAlias = ''" 
              :class="selectedMsgType !== '' ? 'border-blue-500' : 'border-gray-700'" 
              class="flex-1 min-w-[120px] max-w-[300px] truncate bg-gray-950 border text-gray-300 text-sm rounded px-3 py-1.5 outline-none focus:border-blue-500 font-mono transition"
            >
                <option disabled value="">-- Select MsgType --</option>
                {{range $msgId, $msgSpec := .Router.SessionSpec.Messages}}
                  <option value={{$msgId}}>[Sess] Type: {{$msgId}} ({{$msgSpec.Name}})</option>
                {{end}}
                {{if not .Router.IsLegacyRouter}}
                    {{range $msgId, $msgSpec := .Router.ApplSpec.Messages}}
                        <option value="{{$msgId}}">[Appl] Type: {{$msgId}} ({{$msgSpec.Name}})</option>
                    {{end}}
                {{end}}
            </select>
            <span class="text-xs text-gray-500 italic shrink-0 hidden 2xl:inline">&larr; Auto-populates raw payload</span>
        </div>
        
        <button 
          @click="modal = 'form'" 
          class="shrink-0 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 px-3 py-1.5 rounded text-sm 
            font-semibold transition flex items-center space-x-2 shadow-sm cursor-pointer"
        >
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <span>Form Builder</span>
        </button>
    </div>

    <form hx-post="/api/send" hx-swap="none">
      <textarea 
        name="message" 
        id="message-input" 
        minlength="4"
        placeholder="35=D|55=AAPL|54=1|38=100|40=2|..."
        spellcheck="false"
        @htmx:after-swap="$el.value = $event.detail.xhr.responseText"
        class="w-full bg-gray-950/50 border border-gray-800 rounded p-3 font-mono text-sm text-blue-300 focus:outline-none 
          focus:border-blue-500 h-28 placeholder-gray-700 resize-none shadow-inner" 
      ></textarea>

      <div class="mt-3 flex flex-wrap sm:flex-nowrap justify-between items-center gap-3">
          <label class="flex items-center space-x-2 text-sm text-gray-400 cursor-pointer hover:text-white transition min-w-0">
              <input name="raw" value="yes" type="checkbox" x-model="sendRaw" class="rounded bg-gray-900 border-gray-700 w-4 h-4 shrink-0">
              <span class="truncate">Send Raw (Skip Finalize checksum/length)</span>
          </label>
          <button class="shrink-0 bg-blue-600 hover:bg-blue-500 cursor-pointer text-white px-6 sm:px-8 py-2 rounded text-sm font-bold transition shadow-lg flex items-center space-x-2">
              <span>Send Message</span>
              <span class="font-mono opacity-70 bg-blue-700 px-1.5 py-0.5 rounded text-xs hidden sm:inline">⌘↵</span>
          </button>
      </div>
    </form>
</div>
{{end}}
