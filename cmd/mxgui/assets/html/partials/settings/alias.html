{{define "partials/settings/aliases"}}
<div x-show="settingsTab === 'aliases'" hx-trigger="refresh-alias from:body" hx-get="/api/alias/list" hx-vals='{"from": "settings"}'>
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-white mb-2">Message Aliases</h2>
            <p class="text-gray-400 text-sm">Map custom names to raw FIX template strings for rapid testing in the Stream view.</p>
        </div>
        <button @click="modal = 'alias'" class="cursor-pointer bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-sm transition 
            font-bold shadow-lg flex items-center space-x-2"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span>Add Alias</span>
        </button>
    </div>
    
    <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
        <table class="w-full text-left text-sm font-mono">
            <tr class="text-gray-500 border-b border-gray-800 bg-gray-950 uppercase text-xs tracking-wider">
                <th class="p-4">Alias Name</th>
                <th class="p-4">Template String</th>
                <th class="p-4 text-right">Actions</th>
            </tr>
            {{range $aliasName, $aliasValue := .Aliases}}
              <tr class="border-b border-gray-800/50 hover:bg-gray-800/30 transition">
                  <td class="p-4 text-blue-400 font-bold">{{$aliasName}}</td>
                  <td class="p-4 text-gray-300 truncate max-w-md">{{replaceSOH $aliasValue}}</td>
                  <td 
                    class="p-4 text-right text-gray-500 hover:text-red-400 cursor-pointer transition"
                    hx-confirm="Are you sure you want to delete?" 
                    hx-delete="/api/alias/delete/{{$aliasName}}"
                  >Delete</td>
              </tr>
            {{end}}
        </table>
    </div>
</div>
{{end}}
