<!DOCTYPE html>
<html lang="en">
<head>
    <title>MicroFIX</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style> 
      :root { color-scheme: dark; } 
      @keyframes glow-pulse {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 0; }
      }
      .animate-glow-pulse {
          animation: glow-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
    <link href="/assets/css/index.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/assets/image/logo.ico">
    <script src="/assets/js/htmx.min.js"></script> 
    <script src="/assets/js/htmx-ext-sse.min.js"></script>
    <script defer src="/assets/js/alpine-collapse.min.js"></script>
    <script defer src="/assets/js/alpine.js"></script> 
</head>
<body 
  class="bg-[#0a0d12] text-gray-300 h-screen overflow-hidden flex flex-col font-sans selection:bg-blue-900 selection:text-white" 
  data-shortcuts="{{.Shortcuts}}"

  x-data="{ 
    shortcuts: JSON.parse($el.dataset.shortcuts),
    view: 'stream', /* 'stream', 'dictionary', 'toolbox', 'settings' */
    inspectorTab: 'decoded', /* 'decoded', 'validation', 'diff' */
    settingsTab: 'about', /* 'about', 'config', 'aliases' */
    toolboxTab: 'scripts', /* 'validate', 'scripts', 'finalize' */
    modal: '', /* '', 'seq', 'connect', 'form', 'alias' */
    inspectorOpen: false, 
    selectedMsg: null,
    sendRaw: false,
    sidebarOpen: true,
    inSeq: 1, outSeq: 1, /* Added to track modal input */

    handleShortcut(e, dispatch) {
          for (const s of this.shortcuts) {
              const keyMatch = s.key.toLowerCase() === e.key.toLowerCase();
              if (keyMatch && !!s.ctrl === e.ctrlKey && !!s.alt === e.altKey && !!s.shift === e.shiftKey) {
                  e.preventDefault();
                  s.events.forEach(eventName => dispatch(eventName));
                  break;
              }
          }
      }
  }"

  @keydown.window="handleShortcut($event, $dispatch)"
  @view-stream.window="view = 'stream'"
  @view-dictionary.window="view = 'dictionary'"
  @view-session-settings.window="view = 'settings'; settingsTab = 'config'"
  @view-help.window="view = 'settings'; settingsTab = 'about'"
  @view-script-runner.window="view = 'toolbox'; toolboxTab = 'scripts'"
  @close-modal.window="modal = ''"
  @open-inspector-tab.window="inspectorOpen = true"
  @close-inspector.window="inspectorOpen = false"
>

  {{template "partials/global/modals" .}}
  {{template "partials/global/header" .}}

  <div class="flex flex-1 overflow-hidden">
    {{template "partials/global/sidebar" .}}
    {{template "pages/stream" .}}
    {{template "pages/dictionary" .}}
    {{template "pages/toolbox" .}}
    {{template "pages/settings" .}}
  </div>

<div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col"></div>

</body>
</html>
