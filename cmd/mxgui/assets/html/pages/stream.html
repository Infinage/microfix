{{define "pages/stream"}}
<main x-show="view === 'stream'" class="flex-1 flex bg-white dark:bg-[#0d1117] overflow-hidden relative">
    <div class="flex-1 flex flex-col min-w-0 border-r border-gray-200 dark:border-gray-800">
      {{template "partials/stream/send_form" .}}
      {{template "partials/stream/logs" .}}
    </div>

    <aside
      x-show="inspectorOpen" 
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="transform translate-x-full"
      x-transition:enter-end="transform translate-x-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="transform translate-x-0"
      x-transition:leave-end="transform translate-x-full"
      x-data="{inspectorWidth: 480}"
      :style="`width: ${inspectorWidth}px`"
      class="w-[480px] bg-white dark:bg-gray-950 flex flex-col shrink-0 border-l border-gray-200 dark:border-gray-800 
        shadow-2xl z-40 absolute right-0 top-0 bottom-0"
    >
      {{template "partials/stream/inspector/layout" .}}
    </aside>
</main>
{{end}}
