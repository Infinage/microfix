{{define "pages/dictionary"}}
<main x-show="view === 'dictionary'" style="display: none;" class="flex-1 flex bg-gray-50 dark:bg-[#0a0d12] overflow-hidden">
  <div class="w-80 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 flex flex-col shrink-0" x-data="{ search: '' }">
    <div class="p-4 border-b border-gray-200 dark:border-gray-800">
      <input type="text" x-model="search" placeholder="Search Tag or Message..." class="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded px-3 py-2 text-sm text-gray-900 dark:text-gray-300 focus:outline-none focus:border-blue-500 font-mono">
    </div>
    {{template "partials/dictionary/definitions" .}} 
  </div>

  <div id="dict-details" class="flex-1 p-8 overflow-y-auto">
    <div class="h-full flex items-center justify-center text-gray-400 dark:text-gray-600 font-mono text-sm select-none">
      Select a message or field from the left to view details.
    </div>
  </div>
</main>
{{end}}
