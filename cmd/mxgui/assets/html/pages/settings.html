{{define "pages/settings"}}
    <main x-show="view === 'settings'" style="display: none;" class="flex-1 flex bg-[#0a0d12] overflow-hidden">
        <div class="w-64 border-r border-gray-800 bg-gray-950 p-4 flex flex-col shrink-0">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Workspace</h2>
            <div class="space-y-2">
                <button @click="settingsTab = 'about'" :class="settingsTab === 'about' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">About &amp; Help</button>
                <button @click="settingsTab = 'config'" :class="settingsTab === 'config' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">Session Config</button>
                <button @click="settingsTab = 'aliases'" :class="settingsTab === 'aliases' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">Aliases</button>
            </div>
        </div>
        
        <div class="flex-1 p-10 overflow-y-auto">
          {{template "partials/settings/config" .}}
          {{template "partials/settings/aliases" .}}
          {{template "partials/settings/about" .}}
        </div>
    </main>
{{end}}
