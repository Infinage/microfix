{{define "pages/toolbox"}}
<main x-show="view === 'toolbox'" style="display: none;" class="flex-1 flex bg-[#0a0d12] overflow-hidden">
    <div class="w-64 border-r border-gray-800 bg-gray-950 p-4 flex flex-col shrink-0">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Automation Tools</h2>
        <div class="space-y-2">
            <button @click="toolboxTab = 'scripts'" :class="toolboxTab === 'scripts' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">Script Runner</button>
            <button @click="toolboxTab = 'finalize'" :class="toolboxTab === 'finalize' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">FIX Finalize</button>
            <button @click="toolboxTab = 'validate'" :class="toolboxTab === 'validate' ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-900'" class="w-full text-left px-4 py-2 text-sm rounded font-bold transition">Validate Fix Message</button>
        </div>
    </div>
    
    <div class="flex-1 p-10 flex flex-col overflow-hidden">
      {{template "partials/toolbox/script_runner" .}}
      {{template "partials/toolbox/finalize" .}}
      {{template "partials/toolbox/validate" .}}
    </div>
</main>
{{end}}
